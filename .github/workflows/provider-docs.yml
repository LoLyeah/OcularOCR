name: Provider documentation review

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 1 * *'

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check:links
      - name: Review reminder
        run: echo "Compare lib/providers.ts examples and review dates with each linked official model catalog."
